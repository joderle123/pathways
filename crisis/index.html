<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathways CRISIS — Krisenintervention</title>
  <meta name="theme-color" content="#DC2626">
  <link rel="stylesheet" href="../core/ui-base.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-app="crisis">

<!-- ─── Top Bar ────────────────────────────────────────────── -->
<header class="cr-topbar">
  <div class="cr-brand">
    <span class="cr-logo">🚨</span>
    <div>
      <div class="cr-app-name">CRISIS</div>
      <div class="cr-app-tag">Krisenintervention &amp; Sicherheit</div>
    </div>
  </div>
  <div class="cr-context" id="cr-context"></div>
  <a class="btn" href="../hub/" title="Zum Hub">← HUB</a>
</header>

<!-- ─── Notfall-Hotlines (immer sichtbar) ─────────────────── -->
<section class="cr-hotlines">
  <h2>📞 Sofort erreichbar — Luxembourg</h2>
  <div class="cr-hotline-grid">
    <a href="tel:113" class="cr-hotline cr-hotline-emergency">
      <div class="cr-hotline-num">113</div>
      <div class="cr-hotline-name">Polizei (Notruf)</div>
      <div class="cr-hotline-tag">akute Gefahr</div>
    </a>
    <a href="tel:112" class="cr-hotline cr-hotline-emergency">
      <div class="cr-hotline-num">112</div>
      <div class="cr-hotline-name">Rettungsdienst</div>
      <div class="cr-hotline-tag">medizinischer Notfall</div>
    </a>
    <a href="tel:454545" class="cr-hotline">
      <div class="cr-hotline-num">45 45 45</div>
      <div class="cr-hotline-name">SOS Détresse</div>
      <div class="cr-hotline-tag">24/7 anonym</div>
    </a>
    <a href="tel:116111" class="cr-hotline">
      <div class="cr-hotline-num">116 111</div>
      <div class="cr-hotline-name">Kanner-Jugendtelefon</div>
      <div class="cr-hotline-tag">Mo–Fr 11–23h</div>
    </a>
    <a href="tel:26822828" class="cr-hotline">
      <div class="cr-hotline-num">26 82 28 28</div>
      <div class="cr-hotline-name">CHNP Jugendpsychiatrie</div>
      <div class="cr-hotline-tag">Ettelbruck</div>
    </a>
  </div>
</section>

<!-- ─── Tools ─────────────────────────────────────────────── -->
<main class="cr-main">
  <div class="cr-tabs">
    <button class="cr-tab active" data-tab="cssrs" onclick="setTab('cssrs')">🔍 C-SSRS Suizid-Screening</button>
    <button class="cr-tab" data-tab="safety" onclick="setTab('safety')">🛡️ Sicherheitsplan</button>
    <button class="cr-tab" data-tab="triage" onclick="setTab('triage')">🌳 Triage-Baum</button>
    <button class="cr-tab" data-tab="risiko" onclick="setTab('risiko')">📊 Risiko-Verlauf</button>
  </div>

  <div id="cr-content"></div>
</main>

<!-- ─── Toast ─────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ─── Core Modules ───────────────────────────────────────── -->
<script src="../core/db.js"></script>
<script src="../core/bridge.js"></script>
<script src="../core/utils.js"></script>

<!-- ─── Tools ──────────────────────────────────────────────── -->
<script src="tools/cssrs.js"></script>
<script src="tools/safety-plan.js"></script>
<script src="tools/triage.js"></script>

<!-- ─── App ────────────────────────────────────────────────── -->
<script src="app.js"></script>

</body>
</html>
