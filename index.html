<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbeitsblatt-Übersicht – Pathways</title>
  <style>
    :root {
      --primary: #2C5F8A;
      --primary-dark: #1E4468;
      --bg: #EEF2F7;
      --card: #fff;
      --border: #DDE3EA;
      --text: #111827;
      --muted: #6B7280;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Topbar */
    .topbar {
      background: linear-gradient(135deg, #1E4468 0%, #2C5F8A 100%);
      color: white;
      padding: 15px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .topbar-title { font-size: 17px; font-weight: 700; flex: 1; letter-spacing: -0.2px; }
    .topbar a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 12.5px;
      font-weight: 600;
      padding: 6px 13px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 7px;
      transition: background 0.15s, color 0.15s;
    }
    .topbar a:hover { background: rgba(255,255,255,0.15); color: white; }

    /* Suchleiste */
    .suche-leiste {
      background: white;
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .suche-input {
      flex: 1;
      padding: 8px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      max-width: 360px;
      transition: border-color 0.15s;
      color: var(--text);
    }
    .suche-input:focus { border-color: var(--primary); }
    .suche-input::placeholder { color: #9CA3AF; }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: #B0BAC4; color: var(--text); }
    .chip.aktiv { border-color: var(--primary); background: var(--primary); color: white; }

    /* Content */
    .content { padding: 24px 32px 40px; }

    .kategorie-titel {
      font-size: 15px;
      font-weight: 700;
      margin: 28px 0 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .kategorie-titel:first-child { margin-top: 0; }
    .kategorie-zaehler {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-left: 4px;
      background: #F3F4F6;
      padding: 2px 7px;
      border-radius: 10px;
    }

    /* Karten-Grid */
    .ab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
      margin-bottom: 6px;
    }

    .ab-karte {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1.5px solid transparent;
      overflow: hidden;
      transition: all 0.18s cubic-bezier(0.22, 1, 0.36, 1);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .ab-karte:hover {
      border-color: var(--akzent, var(--primary));
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .ab-karte-kopf {
      padding: 13px 15px 9px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ab-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      flex-shrink: 0;
    }
    .ab-titel { font-size: 13px; font-weight: 700; line-height: 1.35; letter-spacing: -0.1px; }

    .ab-karte-body { padding: 9px 15px 13px; flex: 1; display: flex; flex-direction: column; }
    .ab-beschreibung { font-size: 11.5px; color: var(--muted); line-height: 1.55; margin-bottom: 9px; flex: 1; }

    .ab-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .ab-tag {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 10px;
      background: #F3F4F6;
      color: #6B7280;
      border: 1px solid #E5E7EB;
    }

    .ab-open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 100%;
      padding: 8px;
      background: var(--akzent, var(--primary));
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .ab-open-btn:hover { opacity: 0.88; }

    /* Leer-Zustand */
    .leer {
      text-align: center;
      color: var(--muted);
      padding: 48px 20px;
      font-size: 14px;
      grid-column: 1 / -1;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      background: white;
    }

    /* Tabs */
    .tabs-leiste {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 0 32px;
      display: flex;
      gap: 0;
    }
    .tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--primary); }
    .tab.aktiv { color: var(--primary); border-bottom-color: var(--primary); }

    @media (max-width: 700px) {
      .topbar, .suche-leiste, .content { padding-left: 16px; padding-right: 16px; }
      .ab-grid { grid-template-columns: 1fr; }
      .filter-chips { display: none; }
      .tabs-leiste { padding: 0 16px; }
    }
  </style>
</head>

let aktiverFilter = 'Alle';
let aktiverTab = 'ab'; // 'ab' | 'akt' | 'int'

function wechselTab(tab) {
  aktiverTab = tab;
  aktiverFilter = 'Alle';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('aktiv'));
  document.getElementById('tab-' + tab).classList.add('aktiv');
  document.getElementById('suche').value = '';
  init();
}

function init() {
  const chips = document.getElementById('filter-chips');
  const quelle = aktiverTab === 'ab' ? ARBEITSBLÄTTER : aktiverTab === 'akt' ? AKTIVITÄTEN : INTERVENTIONEN;
  const kategorien = ['Alle', ...quelle.map(k => k.kategorie)];
  chips.innerHTML = kategorien.map(k =>
    `<div class="chip ${k === 'Alle' ? 'aktiv' : ''}" onclick="setFilter('${k}')">${k === 'Alle' ? 'Alle' : k.split(' ')[0]}</div>`
  ).join('');
  render();
}

function setFilter(f) {
  aktiverFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('aktiv'));
  document.querySelectorAll('.chip').forEach(c => {
    if (c.textContent.trim() === (f === 'Alle' ? 'Alle' : f.split(' ')[0])) c.classList.add('aktiv');
  });
  render();
}

function filtern() { render(); }

function render() {
  if (aktiverTab === 'ab') renderArbeitsblätter();
  else if (aktiverTab === 'akt') renderAktivitäten();
  else renderInterventionen();
}

function renderArbeitsblätter() {
  const suche = document.getElementById('suche').value.toLowerCase();
  const container = document.getElementById('ab-container');
  let html = '';
  let gesamt = 0;

  ARBEITSBLÄTTER.forEach(kat => {
    if (aktiverFilter !== 'Alle' && kat.kategorie !== aktiverFilter) return;
    const gefiltert = kat.blaetter.filter(b =>
      !suche || b.titel.toLowerCase().includes(suche) ||
      b.beschreibung.toLowerCase().includes(suche) ||
      b.tags.some(t => t.toLowerCase().includes(suche))
    );
    if (gefiltert.length === 0) return;
    gesamt += gefiltert.length;
    html += `<div class="kategorie-titel"><span>${kat.icon}</span> ${kat.kategorie} <span class="kategorie-zaehler">${gefiltert.length}</span></div>`;
    html += `<div class="ab-grid">`;
    gefiltert.forEach(b => {
      html += `
        <a class="ab-karte" href="${b.datei}" target="_blank" style="--akzent:${kat.farbe};">
          <div class="ab-karte-kopf">
            <div class="ab-icon" style="background:${kat.farbe}20;">${kat.icon}</div>
            <div class="ab-titel">${b.titel}</div>
          </div>
          <div class="ab-karte-body">
            <div class="ab-beschreibung">${b.beschreibung}</div>
            <div class="ab-tags">
              ${b.tags.map(t => `<span class="ab-tag">${t}</span>`).join('')}
              <span class="ab-tag">📄 ${b.seiten} Seiten</span>
            </div>
            <div class="ab-open-btn" style="background:${kat.farbe};">📋 Öffnen & Drucken</div>
          </div>
        </a>`;
    });
    html += `</div>`;
  });

function container_render(quelle, karteHtml, leerText) {
  const suche = document.getElementById('suche').value.toLowerCase();
  const container = document.getElementById('ab-container');
  let html = '';
  let gesamt = 0;
  quelle.forEach(kat => {
    if (aktiverFilter !== 'Alle' && kat.kategorie !== aktiverFilter) return;
    const gefiltert = kat.eintraege.filter(b =>
      !suche || b.titel.toLowerCase().includes(suche) ||
      b.beschreibung.toLowerCase().includes(suche) ||
      b.tags.some(t => t.toLowerCase().includes(suche))
    );
    if (gefiltert.length === 0) return;
    gesamt += gefiltert.length;
    html += `<div class="kategorie-titel"><span>${kat.icon}</span> ${kat.kategorie} <span class="kategorie-zaehler">${gefiltert.length}</span></div>`;
    html += `<div class="ab-grid">`;
    gefiltert.forEach(b => { html += karteHtml(b, kat.farbe); });
    html += `</div>`;
  });
  if (gesamt === 0) html = `<div class="leer">${leerText}</div>`;
  container.innerHTML = html;
}
