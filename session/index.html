<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathways SESSION — Sitzungs-Tool</title>
  <meta name="theme-color" content="#8B5CF6">
  <link rel="stylesheet" href="../core/ui-base.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-app="session">

<header class="se-topbar">
  <div class="se-brand">
    <span class="se-logo">📝</span>
    <div>
      <div class="se-app-name">SESSION</div>
      <div class="se-app-tag">Sitzungs-Begleitung</div>
    </div>
  </div>
  <div class="se-context" id="se-context">— ohne Klient —</div>
  <div class="se-timer" id="se-timer" style="display: none;">⏱️ <span id="se-timer-text">00:00</span></div>
  <div class="se-actions">
    <button class="btn btn-danger" id="se-crisis-btn" onclick="openCrisis()" title="Krise">🚨 Krise</button>
    <button class="btn" onclick="toggleTheme()">🌓</button>
    <a class="btn" href="../hub/">← HUB</a>
  </div>
</header>

<nav class="se-modes">
  <button class="se-mode active" data-mode="pre" onclick="setMode('pre')">📋 Pre-Session</button>
  <button class="se-mode" data-mode="live" onclick="setMode('live')">🎯 Live-Session</button>
  <button class="se-mode" data-mode="post" onclick="setMode('post')">📊 Post-Session</button>
  <button class="se-mode" data-mode="history" onclick="setMode('history')">📚 Historie</button>
</nav>

<main class="se-main">
  <div id="se-content"></div>
</main>

<div id="toast-container"></div>

<script src="../core/db.js"></script>
<script src="../core/bridge.js"></script>
<script src="../core/utils.js"></script>
<script src="app.js"></script>

</body>
</html>
